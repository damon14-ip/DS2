<div class="container">

<h3>Crear Detalle de Reserva</h3>

<form (ngSubmit)="guardar()">

<div class="mb-2">
<label>ID Reserva</label>
<input type="number" class="form-control"
[(ngModel)]="detalle.reserva.idReserva"
name="reserva">
</div>

<div class="mb-2">
<label>ID Vuelo</label>
<input type="number" class="form-control"
[(ngModel)]="detalle.vuelo.idVuelo"
name="vuelo">
</div>

<div class="mb-2">
<label>ID Pasajero</label>
<input type="number" class="form-control"
[(ngModel)]="detalle.pasajero.idPasajero"
name="pasajero">
</div>

<div class="mb-2">
<label>ID Asiento</label>
<input type="number" class="form-control"
[(ngModel)]="detalle.asiento.idAsiento"
name="asiento">
</div>

<div class="mb-3">
<label>Tipo Asiento</label>

<select class="form-control"
[(ngModel)]="detalle.tipoAsiento"
name="tipoAsiento">

<option value="ALEATORIO">ALEATORIO</option>
<option value="ESPECIFICO">ESPECIFICO</option>

</select>

</div>

<button class="btn btn-success">
Guardar
</button>

</form>

</div>
