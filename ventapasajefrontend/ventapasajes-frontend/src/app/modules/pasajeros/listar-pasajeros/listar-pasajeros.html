<div class="container mt-5">

<div class="card shadow-lg border-0">

<div class="card-header bg-primary text-white text-center">

<h3 class="mb-0">
✈️ Lista de Pasajeros
</h3>

</div>

<div class="card-body">

<!-- Cargando -->

<div *ngIf="cargando" class="text-center p-4">

<div class="spinner-border text-primary"></div>
<p class="mt-3 fw-bold">Cargando pasajeros...</p>

</div>

<!-- Sin datos -->

<div
*ngIf="!cargando && pasajeros.length === 0"
class="alert alert-info text-center">

👥 No hay pasajeros registrados

</div>

<!-- Tabla -->

<div
class="table-responsive"
*ngIf="!cargando && pasajeros.length > 0">

<table class="table table-hover table-striped text-center align-middle">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Documento</th>
<th>Fecha Nacimiento</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let p of pasajeros">

<td class="fw-bold">
{{p.idPasajero}}
</td>

<td>
{{p.nombre}}
</td>

<td>
{{p.apellido}}
</td>

<td>
{{p.documento}}
</td>

<td>
{{p.fechaNacimiento}}
</td>

<td>

<button
class="btn btn-danger btn-sm shadow-sm"
(click)="eliminar(p.idPasajero)">

🗑 Eliminar

</button>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>
