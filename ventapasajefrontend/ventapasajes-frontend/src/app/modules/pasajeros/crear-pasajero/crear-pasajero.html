<div class="container mt-5">

<div class="card shadow-lg p-4">

<h3 class="text-center mb-4">
👤 Registrar Pasajero
</h3>

<form (ngSubmit)="guardar()">

<div class="mb-3">
<label class="form-label">Nombre</label>
<input
type="text"
class="form-control"
[(ngModel)]="pasajero.nombre"
name="nombre"
required>
</div>

<div class="mb-3">
<label class="form-label">Apellido</label>
<input
type="text"
class="form-control"
[(ngModel)]="pasajero.apellido"
name="apellido"
required>
</div>

<div class="mb-3">
<label class="form-label">Documento</label>
<input
type="text"
class="form-control"
[(ngModel)]="pasajero.documento"
name="documento">
</div>

<div class="mb-3">
<label class="form-label">Fecha Nacimiento</label>
<input
type="date"
class="form-control"
[(ngModel)]="pasajero.fechaNacimiento"
name="fechaNacimiento">
</div>

<div class="text-center">

<button class="btn btn-primary">
💾 Guardar Pasajero
</button>

</div>

</form>

</div>

</div>
