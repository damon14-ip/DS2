<div class="container">

<h3>Lista de Aviones</h3>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>ID</th>
<th>Modelo</th>
<th>Capacidad</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody>

<tr *ngFor="let a of aviones">

<td>{{a.idAvion}}</td>
<td>{{a.modelo}}</td>
<td>{{a.capacidadTotal}}</td>
<td>

<span class="badge bg-info">
{{a.estado}}
</span>

</td>

<td>

<button
class="btn btn-success btn-sm me-1"
(click)="cambiarEstado(a.idAvion!,'EN_VUELO')">

Volar

</button>

<button
class="btn btn-warning btn-sm me-1"
(click)="cambiarEstado(a.idAvion!,'MANTENIMIENTO')">

Mant.

</button>

<button
class="btn btn-danger btn-sm"
(click)="eliminar(a.idAvion!)">

Eliminar

</button>

</td>

</tr>

</tbody>

</table>

</div>
