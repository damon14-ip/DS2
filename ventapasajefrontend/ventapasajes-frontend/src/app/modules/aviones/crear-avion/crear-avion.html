<div class="container mt-5">

<div class="card shadow-lg p-4">

<h3 class="text-center mb-4 text-primary">
✈️ Registrar Avión
</h3>

<form (ngSubmit)="guardar()">

<div class="mb-3">

<label class="form-label">Modelo del avión</label>

<input
type="text"
class="form-control"
[(ngModel)]="avion.modelo"
name="modelo"
placeholder="Ej: Boeing 737"
required>

</div>

<div class="mb-3">

<label class="form-label">Capacidad total</label>

<input
type="number"
class="form-control"
[(ngModel)]="avion.capacidadTotal"
name="capacidadTotal"
placeholder="Ej: 180"
required>

</div>

<button
type="submit"
class="btn btn-primary w-100">

Guardar Avión

</button>

</form>

</div>

</div>
