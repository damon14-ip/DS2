<div class="container mt-5">

  <div class="card shadow-lg p-4">

    <h3 class="text-center mb-4">✈ Crear Aeropuerto</h3>

    <form #form="ngForm" (ngSubmit)="guardar(form)">

      <div class="mb-3">
        <label class="form-label">Nombre del aeropuerto</label>
        <input 
          type="text"
          class="form-control"
          name="nombre"
          [(ngModel)]="aeropuerto.nombre"
          required
          placeholder="Ej: Aeropuerto Jorge Chavez">
      </div>

      <div class="mb-3">
        <label class="form-label">Ciudad</label>
        <input 
          type="text"
          class="form-control"
          name="ciudad"
          [(ngModel)]="aeropuerto.ciudad"
          required
          placeholder="Ej: Lima">
      </div>

      <div class="mb-3">
        <label class="form-label">País</label>
        <input 
          type="text"
          class="form-control"
          name="pais"
          [(ngModel)]="aeropuerto.pais"
          required
          placeholder="Ej: Perú">
      </div>

      <button 
        type="submit"
        class="btn btn-primary w-100"
        [disabled]="cargando">

        {{ cargando ? 'Guardando...' : 'Guardar Aeropuerto' }}

      </button>

    </form>

  </div>

</div>
