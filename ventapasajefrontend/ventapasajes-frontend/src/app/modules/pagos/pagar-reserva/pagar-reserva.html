<div class="container">

<div class="card pago-card">

<h2 class="titulo">Aprobar Pago de Reserva</h2>

<div class="icono">
💳
</div>

<div class="form-group">

<label>ID del Pago</label>

<input
type="number"
class="form-control"
[(ngModel)]="idPago"
placeholder="Ingrese el ID del pago">

</div>

<button
class="btn btn-success btn-pagar"
(click)="aprobar()">

Aprobar Pago

</button>

<div *ngIf="mensaje" class="alert alert-info mt-3">
{{mensaje}}
</div>

<div *ngIf="estado" class="estado">
Estado del pago: <strong>{{estado}}</strong>
</div>

</div>

</div>
