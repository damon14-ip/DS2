<div class="registro-container">

<div class="card">

<h3>Crear Cuenta</h3>

<div *ngIf="mensaje" class="alert alert-danger">
{{mensaje}}
</div>

<form (ngSubmit)="registrar()">

<div class="form-group">

<label>Usuario</label>

<input
type="text"
class="form-control"
[(ngModel)]="username"
name="username"
required>

</div>

<div class="form-group">

<label>Email</label>

<input
type="email"
class="form-control"
[(ngModel)]="email"
name="email"
required>

</div>

<div class="form-group">

<label>Contraseña</label>

<input
type="password"
class="form-control"
[(ngModel)]="password"
name="password"
required>

</div>

<button class="btn btn-success w-100 mt-3">
Registrarse
</button>

<a routerLink="/login" class="btn btn-link w-100">
Volver al login
</a>

</form>

</div>

</div>
