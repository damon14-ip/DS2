<div class="container mt-4">
  <div class="card border-primary shadow">
    <div class="card-header bg-primary text-white">
      <h4><i class="bi bi-airplane"></i> Nueva Reserva de Vuelo</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="reservaForm" (ngSubmit)="confirmar()">
        
        <div class="mb-4">
          <label class="form-label fw-bold">Seleccione su Vuelo:</label>
          <select formControlName="idVuelo" class="form-select border-primary">
            <option [ngValue]="null">-- Elija un destino --</option>
            <option *ngFor="let v of vuelos" [ngValue]="v.idVuelo">
              {{v.origen.nombre}} ➡️ {{v.destino.nombre}} (Base: ${{v.precioBase}})
            </option>
          </select>
          <div *ngIf="reservaForm.get('idVuelo')?.invalid && reservaForm.get('idVuelo')?.touched" class="text-danger small">
            Debe seleccionar un vuelo.
          </div>
        </div>

        <hr>

        <div formArrayName="pasajeros">
          <div *ngFor="let p of pasajeros.controls; let i=index" [formGroupName]="i" class="card mb-3 bg-light border-0 shadow-sm">
            <div class="card-body">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <h6 class="mb-0 text-primary">👤 Pasajero #{{i + 1}}</h6>
                <button type="button" class="btn btn-outline-danger btn-sm" (click)="removerPasajero(i)" *ngIf="pasajeros.length > 1">
                  <i class="bi bi-trash"></i> Quitar
                </button>
              </div>

              <div class="row g-3">
                <div class="col-md-4">
                  <label class="small text-muted">Nombre</label>
                  <input formControlName="nombre" class="form-control" placeholder="Ej: Juan">
                </div>
                <div class="col-md-4">
                  <label class="small text-muted">Apellido</label>
                  <input formControlName="apellido" class="form-control" placeholder="Ej: Pérez">
                </div>
                <div class="col-md-4">
                  <label class="small text-muted">DNI / Documento</label>
                  <input formControlName="documento" class="form-control" placeholder="Número">
                </div>
                <div class="col-md-3">
                  <label class="small text-muted">Edad</label>
                  <input type="number" formControlName="edad" class="form-control">
                </div>
                <div class="col-md-4">
                  <label class="small text-muted">Clase</label>
                  <select formControlName="tipoAsiento" class="form-select">
                    <option value="TURISTA">Turista</option>
                    <option value="VIP">VIP (+30%)</option>
                  </select>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex justify-content-between">
          <button type="button" class="btn btn-secondary" (click)="agregarPasajero()">
            <i class="bi bi-person-plus"></i> + Añadir Pasajero
          </button>
          <button type="submit" class="btn btn-success btn-lg px-5" [disabled]="reservaForm.invalid">
            Confirmar Reserva y Descargar PDF
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
