<div class="container mt-5">
  <div class="card shadow border-0">
    <div class="card-header bg-primary text-white text-center py-3">
      <h4 class="mb-0"><i class="bi bi-person-plus-fill"></i> Registrar Usuario</h4>
    </div>
    <div class="card-body p-4">
      
      <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill"></i> {{ errorMessage }}
        <button type="button" class="btn-close" (click)="errorMessage = null"></button>
      </div>

      <form [formGroup]="userForm" (ngSubmit)="guardar()">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Nombre</label>
            <input type="text" class="form-control" formControlName="nombre" [class.is-invalid]="isInvalid('nombre')">
            <div class="invalid-feedback">Nombre obligatorio (solo letras).</div>
          </div>
          
          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Apellido</label>
            <input type="text" class="form-control" formControlName="apellido" [class.is-invalid]="isInvalid('apellido')">
            <div class="invalid-feedback">Apellido obligatorio (solo letras).</div>
          </div>

          <div class="col-md-6 mb-3">
  <label class="form-label fw-bold">DNI</label>
  <input type="text" class="form-control" formControlName="dni" 
         [class.is-invalid]="isInvalid('dni')" maxlength="8">
  <div class="invalid-feedback">El DNI debe tener exactamente 8 números.</div>
</div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Email</label>
            <input type="email" class="form-control" formControlName="email" [class.is-invalid]="isInvalid('email')">
            <div class="invalid-feedback">Email no válido.</div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Contraseña</label>
            <input type="password" class="form-control" formControlName="password" [class.is-invalid]="isInvalid('password')">
            <div class="invalid-feedback">Mínimo 6 caracteres.</div>
          </div>

          <div class="col-md-6 mb-3">
            <label class="form-label fw-bold">Rol</label>
            <select class="form-select" formControlName="rol">
              <option value="ADMIN">Administrador</option>
              <option value="VENDEDOR">Vendedor / Operador</option>
              <option value="CLIENTE">Cliente</option>
            </select>
          </div>
        </div>

        <div class="d-flex justify-content-end mt-4">
          <a class="btn btn-outline-secondary me-2" routerLink="/admin/usuarios">Cancelar</a>
          <button type="submit" class="btn btn-primary px-4 shadow-sm" [disabled]="userForm.invalid">
            Guardar Usuario
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
