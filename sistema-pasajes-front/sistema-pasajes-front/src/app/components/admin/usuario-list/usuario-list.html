<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="bi bi-people"></i> Gestión de Usuarios</h2>
        <button class="btn btn-primary" routerLink="/admin/usuarios/nuevo">
            <i class="bi bi-person-plus"></i> Nuevo Usuario
        </button>
    </div>

    <div class="card shadow border-0">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>Nombre Completo</th>
                    <th>DNI</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let u of usuarios">
                    <td>{{ u.nombreCompleto }}</td>
                    <td>{{ u.dni }}</td>
                    <td>{{ u.email }}</td>
                    <td>
                        <span class="badge" [ngClass]="{
                            'bg-primary': u.rol === 'ADMIN',
                            'bg-success': u.rol === 'VENDEDOR',
                            'bg-info': u.rol === 'CLIENTE'
                        }">{{ u.rol }}</span>
                    </td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-danger" (click)="borrarUsuario(u.id)">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
