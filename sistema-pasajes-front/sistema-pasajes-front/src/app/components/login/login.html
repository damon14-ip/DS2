<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">AeroWeb</h2>
      <p class="text-muted">Inicia sesión para reservar</p>
    </div>
    
    <form (submit)="onLoginSubmit()">
      <div class="mb-3">
        <label class="form-label small fw-bold">Email</label>
        <input type="email" name="email" [(ngModel)]="loginData.email" class="form-control" placeholder="admin@mail.com" required>
      </div>
      
      <div class="mb-4">
        <label class="form-label small fw-bold">Contraseña</label>
        <input type="password" name="password" [(ngModel)]="loginData.password" class="form-control" placeholder="••••••••" required>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Ingresar</button>
    </form>
  </div>
</div>
